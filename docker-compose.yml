# One shared EUDIPLO instance (+ its admin UI) for every sample under samples/ — no
# Postgres/MinIO/Vault, just the "minimal" profile (SQLite + local file storage) from
# EUDIPLO's own deployment/docker-compose/.env.minimal.example.
# Pinned to a specific tag rather than `latest` so the samples don't silently break
# when EUDIPLO cuts a new release — bump deliberately if you want a newer version.
services:
  eudiplo:
    image: ghcr.io/openwallet-foundation/eudiplo:5.1.0
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - eudiplo-sample-config:/app/config
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  eudiplo-client:
    image: ghcr.io/openwallet-foundation/eudiplo-client:5.1.0
    restart: unless-stopped
    ports:
      - '4200:8080'
    depends_on:
      eudiplo:
        condition: service_healthy
    environment:
      # Must be host-reachable, not the Docker-internal service name — this value is
      # injected as window.env.apiUrl and called directly from the browser, which can't
      # resolve "eudiplo" (that hostname only exists inside the compose network).
      - API_BASE_URL=http://localhost:3000
    healthcheck:
      test: ['CMD', 'wget', '-qO', '/dev/null', 'http://localhost:8080']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  eudiplo-sample-config:
