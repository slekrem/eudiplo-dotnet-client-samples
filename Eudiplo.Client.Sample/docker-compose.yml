# Minimal EUDIPLO instance for running this sample locally — no Postgres/MinIO/Vault,
# just the "minimal" profile (SQLite + local file storage) from EUDIPLO's own
# deployment/docker-compose/.env.minimal.example.
# Pinned to a specific tag rather than `latest` so this sample doesn't silently break
# when EUDIPLO cuts a new release — bump deliberately if you want a newer version.
services:
  eudiplo:
    image: ghcr.io/openwallet-foundation/eudiplo:5.1.0
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - eudiplo-sample-config:/app/config
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  eudiplo-sample-config:
