name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet build Eudiplo.Client.Samples.slnx --configuration Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Eudiplo.Client.Sample.AccessControl/Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Eudiplo.Client.Sample.AccessControl/Frontend/package-lock.json
      - run: npm ci
      - run: npm run build
