name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet build Eudiplo.Client.Samples.slnx --configuration Release

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        frontend:
          - src/Eudiplo.Client.Sample.AccessControl/Frontend
          - src/Eudiplo.Client.Sample.Explorer/Frontend
    defaults:
      run:
        working-directory: ${{ matrix.frontend }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.frontend }}/package-lock.json
      - run: npm ci
      - run: npm run build
